name: 新規上場銘柄 自動収集 & バックテスト再計算

on:
  schedule:
    - cron: '0 */6 * * *'   # 6時間おき (0:00 / 6:00 / 12:00 / 18:00 UTC)
  workflow_dispatch:          # GitHub UI から手動実行も可能

env:
  API_BASE: https://mexc-new-listing-short.vercel.app

jobs:
  collect-and-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ──────────────────────────────────────────────
      # Phase 1: 収集対象リスト取得
      # ──────────────────────────────────────────────
      - name: フェーズ1 — 収集対象リスト取得
        run: |
          echo "直近7日の新規上場銘柄を確認中..."

          RESPONSE=$(curl -s --retry 3 --retry-delay 5 \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"days": 7}' \
            "$API_BASE/api/collect")

          echo "$RESPONSE" | jq -r \
            '"対象: \(.total) 件 | 新規: \(.toFetch | length) 件 | スキップ: \(.toSkip | length) 件"'

          if [ "$(echo "$RESPONSE" | jq -r '.success')" != "true" ]; then
            echo "Phase 1 失敗: $(echo "$RESPONSE" | jq -r '.error // "unknown"')"
            exit 1
          fi

          echo "$RESPONSE" | jq -c '.toFetch' > /tmp/to_fetch.json

      # ──────────────────────────────────────────────
      # Phase 2: 銘柄ごとにKlineデータ収集
      # ──────────────────────────────────────────────
      - name: フェーズ2 — 銘柄ごとにKlineデータ収集
        run: |
          COUNT=$(jq length /tmp/to_fetch.json)

          if [ "$COUNT" -eq 0 ]; then
            echo "新規収集対象なし"
            exit 0
          fi

          echo "$COUNT 銘柄を順次収集します"

          jq -c '.[]' /tmp/to_fetch.json | while IFS= read -r ITEM; do
            SYMBOL=$(echo "$ITEM"      | jq -r '.symbol')
            CREATE_TIME=$(echo "$ITEM" | jq -r '.createTime')

            RESULT=$(curl -s --retry 2 --retry-delay 3 --max-time 65 \
              -X POST \
              -H "Content-Type: application/json" \
              -d "{\"symbol\":\"$SYMBOL\",\"createTime\":$CREATE_TIME}" \
              "$API_BASE/api/collect")

            STATUS=$(echo "$RESULT" | jq -r '.status // "error"')
            case "$STATUS" in
              done)  echo "  ✓ $SYMBOL" ;;
              skip)  echo "  - $SYMBOL (スキップ)" ;;
              *)     echo "  ✗ $SYMBOL: $(echo "$RESULT" | jq -r '.error // "unknown"')" ;;
            esac

            sleep 1
          done

          echo "=== 収集完了 ==="

      # ──────────────────────────────────────────────
      # Phase 3: グリッドサーチ実行 & Blobに保存
      # ──────────────────────────────────────────────
      - name: フェーズ3 — グリッドサーチ実行 & 保存
        run: |
          echo "グリッドサーチを実行中..."
          echo "  条件: 初動ポンプ50%以上 | エントリー 12/24/48h | SL 20/30/40/50% | TP 10/15/20/25/30%"

          RESPONSE=$(curl -s --max-time 120 \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "entryHours":  [12, 24, 48],
              "slRange":     [20, 30, 40, 50],
              "tpRange":     [10, 15, 20, 25, 30],
              "minPumpPct":  50,
              "excludeStock": false,
              "saveLatest":  true
            }' \
            "$API_BASE/api/gridsearch")

          if [ "$(echo "$RESPONSE" | jq -r '.success')" != "true" ]; then
            echo "グリッドサーチ失敗: $(echo "$RESPONSE" | jq -r '.error // "unknown"')"
            exit 1
          fi

          COUNT=$(echo "$RESPONSE" | jq '.results | length')
          echo "完了: $COUNT 組み合わせ計算、gridsearch-latest.json を Blob に保存"

          echo "--- TOP3 ---"
          echo "$RESPONSE" | jq -r \
            '.results[:3][] | "  \(.entryHours)h後 / SL\(.slPct)% / TP\(.tpPct)%  勝率:\(.winRate | floor)%  EV:\(.expectedValue | . * 100 | round / 100)%"'
